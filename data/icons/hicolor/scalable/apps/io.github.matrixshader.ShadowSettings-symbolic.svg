<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Symbolic icon: simplified gear in octagonal frame -->
  <!-- Outer octagon -->
  <polygon points="8,1 12.5,3.5 15,8 12.5,12.5 8,15 3.5,12.5 1,8 3.5,3.5"
           fill="none" stroke="#000000" stroke-width="1" opacity="0.8"/>
  <!-- Gear teeth (cardinal) -->
  <g fill="#000000">
    <rect x="7" y="3" width="2" height="2" rx="0.5"/>
    <rect x="7" y="11" width="2" height="2" rx="0.5"/>
    <rect x="3" y="7" width="2" height="2" rx="0.5"/>
    <rect x="11" y="7" width="2" height="2" rx="0.5"/>
  </g>
  <!-- Gear ring -->
  <circle cx="8" cy="8" r="3" fill="none" stroke="#000000" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="8" cy="8" r="1" fill="#000000"/>
</svg>
